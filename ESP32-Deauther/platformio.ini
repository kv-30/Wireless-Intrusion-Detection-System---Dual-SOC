[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
build_flags = 
  -Wl,-z,muldefs
  -DATTACK_TYPE_SINGLE=1            ; Define attack type for the build
  -DNUM_FRAMES_PER_ATTACK=10        ; Number of frames per attack cycle
  -DATTACK_BLINK_TIMES=5            ; Number of LED blinks for attack
  -DATTACK_BLINK_DURATION=500       ; Duration of each blink in ms
  -DATTACK_DURATION=60               ; Default attack duration (seconds)
  -DATTACK_RATE=10                   ; Default attack rate (Mbps)
  -DNUM_BOTS=5                       ; Number of bots for distributed attacks
  -DATTACK_SLOT_MS=100               ; Slot duration in ms for feint+attack algorithm
monitor_speed = 115200
upload_speed = 115200

